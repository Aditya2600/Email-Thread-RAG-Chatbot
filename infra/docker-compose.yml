services:
  db:
    # Stage-2 ParadeDB backend: bundles pg_search + pgvector on Postgres.
    # Pinned tag (never `latest`) for reproducible migrations/indexes.
    image: paradedb/paradedb:0.24.1
    environment:
      # Local dev credentials only. Never used for production; override
      # via a real secret manager and a non-default DATABASE_URL there.
      POSTGRES_USER: ${POSTGRES_USER:-email_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-email_rag_local_dev}
      POSTGRES_DB: ${POSTGRES_DB:-email_rag}
    ports:
      # Host 5433 to avoid clashing with any other local Postgres on 5432.
      - "5433:5432"
    volumes:
      # Postgres 18+ base image (which this ParadeDB tag uses) expects a
      # single mount at /var/lib/postgresql, not .../data -- see
      # https://github.com/docker-library/postgres/pull/1259
      - paradedb_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-email_rag} -d ${POSTGRES_DB:-email_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    # Ingestion is skipped when the vector index is already on the data mount:
    # rebuilding it re-encodes the whole corpus through torch on CPU, which is
    # minutes of pegged cores on every restart. Delete data/indexes/vector.pkl
    # (or run the script by hand) to force a rebuild.
    command: >
      sh -c "{ test -f /app/data/indexes/vector.pkl ||
      python -m email_thread_rag.scripts.ingest_corpus; } &&
      exec uvicorn email_thread_rag.app.main:app --host 0.0.0.0 --port 8000"
    environment:
      # torch/OpenMP default to one thread per core and saturate the host during
      # embedding. A cgroup cpu limit alone would not help: the pool is still
      # sized from the host core count, so the threads just thrash against the
      # quota. Capping the pool is the fix; raise it if embedding is too slow.
      OMP_NUM_THREADS: 4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../runs:/app/runs

# Frontend (frontend/) isn't dockerized: run it with `npm run dev` against
# this api service (VITE_BACKEND_ORIGIN=http://localhost:8000).

volumes:
  paradedb_data:

